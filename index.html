  <style>
    /* ============================================================= */
    /* DESIGN TOKENS                                                  */
    /* Identity: a "stadium floodlight at night" feel. Deep ink navy  */
    /* pitch, a single electric-lime accent for the live/selected     */
    /* state, warm chalk for text. The signature is the vertical      */
    /* "round rail" on the left that fills as you progress.           */
    /* ============================================================= */
    :root {
      --ink:        #0B1020;  /* deep night-navy background        */
      --ink-2:      #131A30;  /* raised card surface               */
      --ink-3:      #1C2540;  /* hover / border surface            */
      --chalk:      #EDEFF7;  /* primary text                      */
      --chalk-dim:  #8C93AD;  /* secondary text                    */
      --lime:       #C8FF3D;  /* electric accent (selected/live)   */
      --lime-deep:  #9AD400;  /* accent pressed                    */
      --coral:      #FF5D5D;  /* error state                       */
      --line:       rgba(255,255,255,0.08);
      --glow:       rgba(200,255,61,0.10); /* top floodlight glow  */
      --pick-bg:    rgba(200,255,61,0.08); /* selected team tint   */
      --radius:     14px;
      --maxw:       560px;
    }

    /* Light theme — same identity, inverted for daylight. Applied when the
       <html> element has data-theme="light". The accent deepens slightly so
       the lime stays readable on pale surfaces, and text buttons use dark ink. */
    html[data-theme="light"] {
      --ink:        #F4F6FB;  /* soft off-white page background     */
      --ink-2:      #FFFFFF;  /* raised card surface (white)        */
      --ink-3:      #E7EBF3;  /* hover / border surface             */
      --chalk:      #141A2B;  /* primary text (dark ink)            */
      --chalk-dim:  #5C6480;  /* secondary text                    */
      --lime:       #6FA300;  /* deepened lime for contrast on light*/
      --lime-deep:  #557E00;  /* accent pressed                    */
      --coral:      #D63B3B;  /* error state                       */
      --line:       rgba(20,26,43,0.12);
      --glow:       rgba(111,163,0,0.10);
      --pick-bg:    rgba(111,163,0,0.10);
    }
    /* On light theme, primary buttons read better with white text on the
       deepened green instead of dark-on-lime. */
    html[data-theme="light"] .btn-primary { color: #FFFFFF; }
    html[data-theme="light"] .team-btn.picked .team-name { color: var(--lime); }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { margin: 0; padding: 0; }

    body {
      background: var(--ink);
      /* subtle floodlight glow from the top (themeable) */
      background-image: radial-gradient(120% 60% at 50% -10%, var(--glow), transparent 60%);
      color: var(--chalk);
      font-family: 'Archivo', system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    .wrap {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 24px 18px 120px;
    }

    /* ---- Header / brand ---- */
    .brand-eyebrow {
      font-family: 'Space Grotesk', monospace;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--lime);
      margin: 0 0 6px;
    }
    .brand-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 0.98;
      letter-spacing: -0.01em;
      margin: 0;
      text-transform: uppercase;
    }
    .brand-sub {
      color: var(--chalk-dim);
      font-size: 14px;
      margin: 10px 0 0;
      max-width: 38ch;
    }

    /* ---- Progress rail (signature element) ---- */
    .rail {
      display: flex;
      gap: 6px;
      margin: 22px 0 8px;
    }
    .rail-seg {
      flex: 1;
      height: 6px;
      border-radius: 99px;
      background: var(--ink-3);
      overflow: hidden;
      position: relative;
    }
    .rail-seg > i {
      position: absolute; inset: 0;
      background: var(--lime);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }
    .rail-seg.done > i { transform: scaleX(1); }
    .rail-seg.active > i { transform: scaleX(0.5); }
    .rail-label {
      font-family: 'Space Grotesk', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--chalk-dim);
      display: flex;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .rail-label b { color: var(--chalk); font-weight: 700; }

    /* ---- Cards ---- */
    .card {
      background: var(--ink-2);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }

    /* ---- Email step ---- */
    .field-label {
      font-size: 13px;
      color: var(--chalk-dim);
      display: block;
      margin-bottom: 8px;
    }
    .input {
      width: 100%;
      background: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--chalk);
      font-size: 16px; /* 16px avoids iOS zoom-on-focus */
      font-family: inherit;
      padding: 14px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input:focus { border-color: var(--lime); }
    .input.invalid { border-color: var(--coral); }
    .hint { font-size: 12px; margin-top: 8px; min-height: 16px; }
    .hint.err { color: var(--coral); }
    .hint.ok  { color: var(--chalk-dim); }

    /* ---- Matchup pick ---- */
    .match-meta {
      font-family: 'Space Grotesk', monospace;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--chalk-dim);
      margin: 0 0 12px;
    }
    .match-count { color: var(--lime); }
    .versus {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: stretch;
    }
    .team-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--ink);
      border: 1.5px solid var(--line);
      border-radius: 12px;
      color: var(--chalk);
      padding: 20px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      min-height: 104px;
      transition: border-color 0.15s, background 0.15s, transform 0.08s;
    }
    .team-btn:hover { border-color: var(--ink-3); background: var(--ink-3); }
    .team-btn:active { transform: scale(0.98); }
    .team-btn.picked {
      border-color: var(--lime);
      background: var(--pick-bg);
    }
    .team-btn.picked .team-name { color: var(--lime); }
    .team-btn:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }
    .flag { font-size: 34px; line-height: 1; }
    .team-name { text-align: center; line-height: 1.1; }
    .vs-pill {
      align-self: center;
      font-family: 'Archivo Black', sans-serif;
      font-size: 12px;
      color: var(--chalk-dim);
      letter-spacing: 0.05em;
    }

    /* TBD placeholder team (slot not yet filled) */
    .team-btn.tbd { opacity: 0.55; }

    /* ---- Nav buttons ---- */
    .nav {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }
    .btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 15px 16px;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.08s, opacity 0.15s, background 0.15s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--lime); color: #10160A; }
    .btn-primary:hover { background: var(--lime-deep); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: var(--chalk-dim);
      border: 1px solid var(--line);
      flex: 0 0 auto;
      padding-left: 22px; padding-right: 22px;
    }
    .btn-ghost:hover { color: var(--chalk); border-color: var(--ink-3); }
    .btn:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }

    /* ---- Review / champion ---- */
    .champ-wrap { text-align: center; padding: 8px 0 4px; }
    .champ-flag { font-size: 80px; line-height: 1; }
    .champ-name {
      font-family: 'Archivo Black', sans-serif;
      font-size: 30px;
      text-transform: uppercase;
      margin: 10px 0 4px;
      color: var(--lime);
    }
    .champ-tag {
      font-family: 'Space Grotesk', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--chalk-dim);
    }
    .summary-group { margin-top: 18px; }
    .summary-h {
      font-family: 'Space Grotesk', monospace;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--chalk-dim);
      margin: 0 0 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .summary-edit {
      background: none; border: none; color: var(--lime);
      font-family: 'Space Grotesk', monospace; font-size: 11px;
      letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase;
    }
    .pick-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; padding: 6px 0;
      border-bottom: 1px solid var(--line);
    }
    .pick-row:last-child { border-bottom: none; }
    .pick-row .pf { font-size: 18px; }

    /* ---- Confirmation ---- */
    .done-mark {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--lime); color: #10160A;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; margin: 0 auto 14px;
    }
    .center { text-align: center; }

    /* ---- Language toggle ---- */
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; }
    .toggle-group { display: flex; gap: 8px; flex-shrink: 0; }
    .lang-toggle {
      background: var(--ink-2); border: 1px solid var(--line);
      border-radius: 99px; color: var(--chalk-dim);
      font-family: 'Space Grotesk', monospace; font-size: 12px;
      padding: 7px 14px; cursor: pointer; letter-spacing: 0.08em;
    }
    .lang-toggle:hover { color: var(--chalk); border-color: var(--ink-3); }

    /* ---- RTL support for Arabic ---- */
    [dir="rtl"] .rail-seg > i { transform-origin: right; }
    [dir="rtl"] .team-name, [dir="rtl"] .brand-sub { text-align: right; }

    .fade-in { animation: fade 0.35s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    .footnote { color: var(--chalk-dim); font-size: 11px; text-align: center; margin-top: 20px; line-height: 1.5; }
  </style>
</head>

        copied: "تم النسخ",

    /* =================================================================
       2) BRACKET DATA MODEL
       -----------------------------------------------------------------
       Teams are keyed by a short id. Each team has flag emoji + names.
       The game starts at the Quarter-finals with 8 placeholder teams.
       To change a team, edit the TEAMS map and the QF_TIES pairings below.

       advancement: the knockout tree is FIXED (no redraws). Each match
       feeds a specific slot in the next round. We model that with
       "feeds" — see buildRounds().
       ================================================================= */

    // id -> { flag, en, ar }
    const TEAMS = {
      RSA: { flag: "🇿🇦", en: "South Africa", ar: "جنوب أفريقيا" },
      CAN: { flag: "🇨🇦", en: "Canada",       ar: "كندا" },
      BRA: { flag: "🇧🇷", en: "Brazil",       ar: "البرازيل" },
      JPN: { flag: "🇯🇵", en: "Japan",        ar: "اليابان" },
      GER: { flag: "🇩🇪", en: "Germany",      ar: "ألمانيا" },
      PAR: { flag: "🇵🇾", en: "Paraguay",     ar: "باراغواي" },
      NED: { flag: "🇳🇱", en: "Netherlands",  ar: "هولندا" },
      MAR: { flag: "🇲🇦", en: "Morocco",      ar: "المغرب" },
      CIV: { flag: "🇨🇮", en: "Ivory Coast",  ar: "ساحل العاج" },
      NOR: { flag: "🇳🇴", en: "Norway",       ar: "النرويج" },
      FRA: { flag: "🇫🇷", en: "France",       ar: "فرنسا" },
      SWE: { flag: "🇸🇪", en: "Sweden",       ar: "السويد" },
      MEX: { flag: "🇲🇽", en: "Mexico",       ar: "المكسيك" },
      ECU: { flag: "🇪🇨", en: "Ecuador",      ar: "الإكوادور" },
      ENG: { flag: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", en: "England",      ar: "إنجلترا" },
      COD: { flag: "🇨🇩", en: "DR Congo",     ar: "الكونغو الديمقراطية" },
      BEL: { flag: "🇧🇪", en: "Belgium",      ar: "بلجيكا" },
      SEN: { flag: "🇸🇳", en: "Senegal",      ar: "السنغال" },
      USA: { flag: "🇺🇸", en: "United States",ar: "الولايات المتحدة" },
      BIH: { flag: "🇧🇦", en: "Bosnia & Herz.",ar: "البوسنة والهرسك" },
      ESP: { flag: "🇪🇸", en: "Spain",        ar: "إسبانيا" },
      AUT: { flag: "🇦🇹", en: "Austria",      ar: "النمسا" },
      SUI: { flag: "🇨🇭", en: "Switzerland",  ar: "سويسرا" },
      ALG: { flag: "🇩🇿", en: "Algeria",      ar: "الجزائر" },
      POR: { flag: "🇵🇹", en: "Portugal",     ar: "البرتغال" },
      CRO: { flag: "🇭🇷", en: "Croatia",      ar: "كرواتيا" },
      AUS: { flag: "🇦🇺", en: "Australia",    ar: "أستراليا" },
      EGY: { flag: "🇪🇬", en: "Egypt",        ar: "مصر" },
      ARG: { flag: "🇦🇷", en: "Argentina",    ar: "الأرجنتين" },
      CPV: { flag: "🇨🇻", en: "Cabo Verde",   ar: "الرأس الأخضر" },
      COL: { flag: "🇨🇴", en: "Colombia",     ar: "كولومبيا" },
      GHA: { flag: "🇬🇭", en: "Ghana",        ar: "غانا" },
    };

    // Quarter-finals — 4 ties, the starting round. These 8 teams are placeholders
    // for now; swap them after the Round of 16 is decided by editing the pairs below.
    // Each tie: [home, away]. Order matters: ties 0-1 feed SF tie 0, ties 2-3 feed SF tie 1.
    const QF_TIES = [
      ["FRA", "MAR"], // QF1 — top-left quarter
      ["ESP", "SEN"], // QF2 — bottom-left quarter   (QF1 & QF2 feed SF1)
      ["BRA", "ENG"], // QF3 — top-right quarter
      ["ARG", "COL"], // QF4 — bottom-right quarter   (QF3 & QF4 feed SF2)
    ];

    // Round labels & how many ties per round. Game now starts at the quarter-finals.
    const ROUND_DEFS = [
      { key: "qf", count: 4 },
      { key: "sf", count: 2 },
      { key: "f",  count: 1 },
    ];

    // A "TBD" placeholder team used before a slot is filled by a prior pick.
    const TBD = { flag: "⚽", en: "TBD", ar: "يُحدد لاحقاً", isTbd: true };

    /* Build the full list of rounds. Each round is an array of ties.
       A tie = { id, roundKey, idxInRound, home, away, winner }.
       home/away are either a team id (string) OR a reference object
       { fromTie: <tieId> } meaning "winner of that earlier tie". */
    function buildRounds() {
      const rounds = [];

      // Quarter-finals — concrete teams (the starting round)
      const qf = QF_TIES.map((pair, i) => ({
        id: `qf-${i}`, roundKey: "qf", idxInRound: i,
        home: pair[0], away: pair[1], winner: null,
      }));
      rounds.push(qf);

      // Subsequent rounds: each tie pulls winners from two ties below it.
      for (let r = 1; r < ROUND_DEFS.length; r++) {
        const def = ROUND_DEFS[r];
        const prev = rounds[r - 1];
        const ties = [];
        for (let i = 0; i < def.count; i++) {
          ties.push({
            id: `${def.key}-${i}`, roundKey: def.key, idxInRound: i,
            home: { fromTie: prev[i * 2].id },
            away: { fromTie: prev[i * 2 + 1].id },
            winner: null,
          });
        }
        rounds.push(ties);
      }
      return rounds;
    }

    // Email validation — pragmatic, not RFC-perfect.
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    /* =================================================================
       3) APP
       ================================================================= */
    function App() {
      const [lang, setLang] = useState("en");

      // Theme: "light" (default) or "dark". Applied to <html> so the CSS
      // variable overrides take effect. Remembered for the session only.
      const [theme, setTheme] = useState("light");
      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);
      const t = I18N[lang];

      // step: "email" | round index 0..4 | "review" | "done"
      const [step, setStep] = useState("email");
      const [email, setEmail] = useState("");
      const [emailTouched, setEmailTouched] = useState(false);

      // rounds state — the whole tree, with winners stored on each tie.
      const [rounds, setRounds] = useState(buildRounds);

      const [submitState, setSubmitState] = useState("idle"); // idle|sending|error|done
      const [copied, setCopied] = useState(false);

      // Has this device already submitted? (client-side dup guard)
      const [alreadyDone, setAlreadyDone] = useState(false);
      useEffect(() => {
        try {
          if (window.__wc26_submitted) setAlreadyDone(true);
        } catch (e) {}
      }, []);

      const emailValid = EMAIL_RE.test(email.trim());

      // Resolve a tie's two sides into concrete team objects (or TBD).
      function resolveSide(side) {
        if (typeof side === "string") return { id: side, ...TEAMS[side] };
        // it's a { fromTie } reference
        const w = findWinner(side.fromTie);
        if (!w) return { id: null, ...TBD };
        return { id: w, ...TEAMS[w] };
      }
      function findWinner(tieId) {
        for (const round of rounds) {
          const tie = round.find((x) => x.id === tieId);
          if (tie) return tie.winner;
        }
        return null;
      }

      // Pick a winner. When a winner changes, clear any downstream picks
      // that depended on the old winner (so the tree stays consistent).
      function pickWinner(tie, teamId) {
        setRounds((prev) => {
          const next = prev.map((round) => round.map((x) => ({ ...x })));
          // set the winner
          for (const round of next) {
            const target = round.find((x) => x.id === tie.id);
            if (target) {
              if (target.winner === teamId) return prev; // no-op
              target.winner = teamId;
            }
          }
          // cascade: clear downstream winners that are no longer valid
          clearOrphans(next);
          return next;
        });
      }

      // After a change, walk forward and clear any winner that is no longer
      // one of the two teams actually feeding that tie.
      function clearOrphans(allRounds) {
        const winnerOf = (id) => {
          for (const r of allRounds) {
            const tt = r.find((x) => x.id === id);
            if (tt) return tt.winner;
          }
          return null;
        };
        for (let r = 1; r < allRounds.length; r++) {
          for (const tie of allRounds[r]) {
            const sides = [tie.home, tie.away].map((s) =>
              typeof s === "string" ? s : winnerOf(s.fromTie)
            );
            if (tie.winner && !sides.includes(tie.winner)) {
              tie.winner = null;
            }
          }
        }
      }

      // Is the current round fully picked?
      function roundComplete(roundIdx) {
        return rounds[roundIdx].every((tie) => {
          const h = resolveSide(tie.home);
          const a = resolveSide(tie.away);
          // both sides must be known AND a winner chosen
          return !h.isTbd && !a.isTbd && tie.winner;
        });
      }

      // Build the payload that gets submitted.
      function buildPayload() {
        const nameOf = (id) => (id && TEAMS[id] ? TEAMS[id].en : null);
        const winners = (roundIdx) =>
          rounds[roundIdx].map((tie) => nameOf(tie.winner));
        return {
          email: email.trim().toLowerCase(),
          submittedAt: new Date().toISOString(),
          quarterFinals: winners(0),   // 4 winners
          semiFinals: winners(1),      // 2 winners (the two finalists)
          final: nameOf(rounds[2][0].winner),   // winner of the final = champion
          champion: nameOf(rounds[2][0].winner),
        };
      }

      // Submit handler.
      async function handleSubmit() {
        setSubmitState("sending");
        const payload = buildPayload();

        // DEMO MODE: no endpoint configured.
        if (!SUBMIT_ENDPOINT) {
          console.log("WC26 bracket payload (demo mode — not sent):", payload);
          await new Promise((res) => setTimeout(res, 700));
          markSubmitted();
          setSubmitState("done");
          setStep("done");
          return;
        }

        try {
          // The Cloudflare Worker returns proper CORS headers, so we can use a
          // normal request and actually read whether it succeeded. The Worker
          // accepts JSON and forwards it to GitHub behind the scenes.
          const res = await fetch(SUBMIT_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error("Bad status " + res.status);
          markSubmitted();
          setSubmitState("done");
          setStep("done");
        } catch (err) {
          console.error(err);
          setSubmitState("error");
        }
      }

      function markSubmitted() {
        try { window.__wc26_submitted = true; } catch (e) {}
        setAlreadyDone(true);
      }

      function copyShareLink() {
        const url = window.location.href;
        navigator.clipboard?.writeText(url).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 1800);
        });
      }

      // Total number of rounds (now 3: QF, SF, Final). Used so the UI adapts
      // automatically if the number of rounds ever changes.
      const LAST_ROUND = ROUND_DEFS.length - 1;     // index of the final round
      const REVIEW_INDEX = ROUND_DEFS.length;       // step index treated as "review"

      // --- progress rail data ---
      const stepIndex = step === "email" ? -1 : step === "review" || step === "done" ? REVIEW_INDEX : step;

      /* ------------------------- RENDER ------------------------- */
      return (
        <div className="wrap" dir={t.dir}>
          {/* Top bar: brand + language toggle */}
          <div className="topbar">
            <div>
              <p className="brand-eyebrow">{t.eyebrow}</p>
              <h1 className="brand-title">
                {t.title.split("\n").map((line, i) => (
                  <span key={i}>{line}{i === 0 ? <br/> : null}</span>
                ))}
              </h1>
            </div>
            <div className="toggle-group">
              <button
                className="lang-toggle"
                onClick={() => setTheme(theme === "dark" ? "light" : "dark")}
                aria-label="Toggle light or dark theme"
              >
                {theme === "dark" ? "☀️" : "🌙"}
              </button>
              <button className="lang-toggle" onClick={() => setLang(lang === "en" ? "ar" : "en")}>
                {lang === "en" ? "العربية" : "EN"}
              </button>
            </div>
          </div>

          {/* Progress rail — only show once started */}
          {step !== "email" && (
            <RailProgress t={t} rounds={ROUND_DEFS} stepIndex={stepIndex} roundComplete={roundComplete} />
          )}

          {/* ---- EMAIL STEP ---- */}
          {step === "email" && (
            <div className="fade-in">
              <p className="brand-sub" style={{ marginBottom: 22 }}>{t.sub}</p>
              <div className="card">
                <label className="field-label" htmlFor="email">{t.emailLabel}</label>
                <input
                  id="email"
                  className={"input" + (emailTouched && !emailValid ? " invalid" : "")}
                  type="email"
                  inputMode="email"
                  autoComplete="email"
                  placeholder={t.emailPlaceholder}
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  onBlur={() => setEmailTouched(true)}
                  onKeyDown={(e) => { if (e.key === "Enter" && emailValid) setStep(0); }}
                />
                <div className={"hint " + (emailTouched && !emailValid ? "err" : "ok")}>
                  {emailTouched && !emailValid ? t.emailInvalid : t.emailOk}
                </div>
                {alreadyDone && <div className="hint err">{t.sharedAlready}</div>}
                <div className="nav">
                  <button
                    className="btn btn-primary"
                    disabled={!emailValid}
                    onClick={() => setStep(0)}
                  >
                    {t.start}
                  </button>
                </div>
              </div>
              <p className="footnote">{t.chooseWinner}</p>
            </div>
          )}

          {/* ---- ROUND STEPS (0..4) ---- */}
          {typeof step === "number" && (
            <RoundStep
              key={step}
              t={t}
              lang={lang}
              roundIdx={step}
              ties={rounds[step]}
              resolveSide={resolveSide}
              pickWinner={pickWinner}
              complete={roundComplete(step)}
              onBack={() => setStep(step === 0 ? "email" : step - 1)}
              onNext={() => setStep(step === LAST_ROUND ? "review" : step + 1)}
              isLastRound={step === LAST_ROUND}
            />
          )}

          {/* ---- REVIEW STEP ---- */}
          {step === "review" && (
            <ReviewStep
              t={t} lang={lang} rounds={rounds} resolveSide={resolveSide}
              onEdit={(idx) => setStep(idx)}
              onBack={() => setStep(LAST_ROUND)}
              onSubmit={handleSubmit}
              submitState={submitState}
            />
          )}

          {/* ---- DONE ---- */}
          {step === "done" && (
            <div className="card center fade-in" style={{ marginTop: 18 }}>
              <div className="done-mark">✓</div>
              <h2 style={{ margin: "0 0 6px", fontFamily: "'Archivo Black'", textTransform: "uppercase" }}>
                {t.doneTitle}
              </h2>
              <p style={{ color: "var(--chalk-dim)", margin: "0 0 18px" }}>{t.doneSub}</p>
              {!SUBMIT_ENDPOINT && <p className="footnote">{t.demoNote}</p>}
              <div className="nav">
                <button className="btn btn-primary" onClick={copyShareLink}>
                  {copied ? t.copied : t.copyLink}
                </button>
              </div>
            </div>
          )}

          <p className="footnote">
            World Cup 2026 · Quarter-finals → Final · Predictions only, not affiliated with FIFA.
          </p>
        </div>
      );
    }

    /* ---- Progress rail component ---- */
    function RailProgress({ t, rounds, stepIndex, roundComplete }) {
      // Build labels from the actual rounds in play (QF, SF, Final).
      const labels = rounds.map((r) => t.roundNames[r.key]);
      const n = rounds.length;                    // number of rounds
      const reviewIndex = n;                       // step index for review/done
      const current = Math.min(stepIndex, n - 1);
      const currentLabel = stepIndex >= reviewIndex ? t.reviewTitle : (current >= 0 ? labels[current] : "");
      // Position counter: rounds are 1..n, review counts as n.
      const counter = Math.max(0, Math.min(stepIndex >= reviewIndex ? n : stepIndex + 1, n));
      return (
        <div>
          <div className="rail">
            {rounds.map((r, i) => {
              const isDone = stepIndex > i;
              const isActive = stepIndex === i;
              return (
                <div key={i} className={"rail-seg" + (isDone ? " done" : isActive ? " active" : "")}>
                  <i />
                </div>
              );
            })}
          </div>
          <div className="rail-label">
            <b>{currentLabel}</b>
            <span>{counter}/{n}</span>
          </div>
        </div>
      );
    }

    /* ---- A single round of picks ---- */
    function RoundStep({ t, lang, roundIdx, ties, resolveSide, pickWinner, complete, onBack, onNext, isLastRound }) {
      const roundKey = ROUND_DEFS[roundIdx].key;
      const total = ties.length;
      const picked = ties.filter((x) => x.winner).length;

      return (
        <div className="fade-in">
          <p className="match-meta">
            {t.roundNames[roundKey]} · <span className="match-count">{picked}/{total}</span>
          </p>

          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {ties.map((tie, i) => {
              const home = resolveSide(tie.home);
              const away = resolveSide(tie.away);
              const locked = home.isTbd || away.isTbd;
              return (
                <div className="card" key={tie.id}>
                  <p className="match-meta" style={{ margin: "0 0 10px" }}>
                    {t.match} {i + 1} {t.of} {total}
                  </p>
                  <div className="versus">
                    <TeamButton
                      team={home} lang={lang} t={t}
                      picked={tie.winner === home.id}
                      disabled={locked}
                      onClick={() => !locked && home.id && pickWinner(tie, home.id)}
                    />
                    <span className="vs-pill">{t.vs}</span>
                    <TeamButton
                      team={away} lang={lang} t={t}
                      picked={tie.winner === away.id}
                      disabled={locked}
                      onClick={() => !locked && away.id && pickWinner(tie, away.id)}
                    />
                  </div>
                </div>
              );
            })}
          </div>

          <div className="nav">
            <button className="btn btn-ghost" onClick={onBack}>{t.back}</button>
            <button className="btn btn-primary" disabled={!complete} onClick={onNext}>
              {isLastRound ? t.review : t.next}
            </button>
          </div>
        </div>
      );
    }

    function TeamButton({ team, lang, t, picked, disabled, onClick }) {
      const name = team.isTbd ? t.tbd : team[lang];
      return (
        <button
          className={"team-btn" + (picked ? " picked" : "") + (team.isTbd ? " tbd" : "")}
          onClick={onClick}
          disabled={disabled}
          aria-pressed={picked}
        >
          <span className="flag">{team.flag}</span>
          <span className="team-name">{name}</span>
        </button>
      );
    }

    /* ---- Review screen with edit links + champion highlight ---- */
    function ReviewStep({ t, lang, rounds, resolveSide, onEdit, onBack, onSubmit, submitState }) {
      // Champion = winner of the final (the last round, single tie).
      const champId = rounds[rounds.length - 1][0].winner;
      const champ = champId ? { id: champId, ...TEAMS[champId] } : null;

      // Summarise every round in play, in order (QF, SF, Final).
      const groupOrder = rounds.map((round, idx) => ({ idx, key: round[0].roundKey }));

      return (
        <div className="fade-in">
          {/* Champion hero */}
          <div className="card champ-wrap">
            <p className="champ-tag">{t.champion}</p>
            {champ && <div className="champ-flag">{champ.flag}</div>}
            {champ && <div className="champ-name">{champ[lang]}</div>}
          </div>

          {/* Per-round summary */}
          {groupOrder.map((g) => (
            <div className="summary-group card" key={g.key}>
              <p className="summary-h">
                {t.roundNames[g.key]}
                <button className="summary-edit" onClick={() => onEdit(g.idx)}>{t.edit}</button>
              </p>
              {rounds[g.idx].map((tie) => {
                const w = tie.winner ? { id: tie.winner, ...TEAMS[tie.winner] } : null;
                return (
                  <div className="pick-row" key={tie.id}>
                    <span className="pf">{w ? w.flag : "⚽"}</span>
                    <span>{w ? w[lang] : t.tbd}</span>
                  </div>
                );
              })}
            </div>
          ))}

          {submitState === "error" && (
            <p className="hint err" style={{ textAlign: "center", marginTop: 14 }}>{t.submitErr}</p>
          )}

          <div className="nav">
            <button className="btn btn-ghost" onClick={onBack}>{t.back}</button>
            <button
              className="btn btn-primary"
              onClick={onSubmit}
              disabled={submitState === "sending"}
            >
              {submitState === "sending" ? t.submitting : (submitState === "error" ? t.retry : t.submit)}
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
